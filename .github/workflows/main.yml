name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-app:1.1 .

      - name: Run container
        run: docker run -d -p 8000:8000 my-app:1.1

      - name: Wait
        run: sleep 5

      - name: Test app
        run: curl http://localhost:8000