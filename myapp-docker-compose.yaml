version: '3'
services:
  db:
    image: postgres:15
    environment:
    - POSTGRES_PASSWORD=password
    - POSTGRES_USER=postgres
    - POSTGRES_DB=appdb
    volumes:
    - db_data:/var/lib/postgresql/data
  my-app:
    depends_on:
    - db
    image: my-app:1.1
    ports:
    - 8000:8000
    environment:
    - DB_HOST=db
    - DB_USER=postgres
    - DB_PASSWORD=password
    - DB_NAME=appdb
volumes:
  db_data:
    driver: local